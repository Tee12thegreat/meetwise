<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — MeetWise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080C16; --surface: #0F1525; --surface-2: #161E30;
      --border: #1E2A40; --gold: #D4A843; --gold-light: #F0C060;
      --text: #E8EAF0; --text-muted: #6B7A9A; --text-dim: #4A5570;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -30%; left: -20%;
      width: 60%; height: 80%;
      background: radial-gradient(ellipse at center, rgba(212,168,67,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -20%; right: -10%;
      width: 50%; height: 60%;
      background: radial-gradient(ellipse at center, rgba(74,143,245,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-box {
      width: 100%;
      max-width: 400px;
      padding: 20px;
      animation: fadeUp 0.5s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 52px; height: 52px;
      background: var(--gold);
      border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 700; color: var(--bg);
      margin-bottom: 16px;
    }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 700; }
    .brand-name span { color: var(--gold); }
    .brand-tagline { font-size: 13px; color: var(--text-muted); margin-top: 4px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .card h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px; margin-bottom: 6px; }
    .card p { font-size: 13px; color: var(--text-muted); margin-bottom: 26px; }
    .form-group { margin-bottom: 18px; }
    .form-label { display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .form-control {
      width: 100%; background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px;
      color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
      transition: border-color 0.18s; outline: none;
    }
    .form-control:focus { border-color: var(--gold); }
    .form-control::placeholder { color: var(--text-dim); }
    .btn-primary {
      width: 100%; padding: 12px;
      background: var(--gold); color: var(--bg);
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.18s; margin-top: 6px;
    }
    .btn-primary:hover { background: var(--gold-light); transform: translateY(-1px); }
    .error-list { list-style: none; margin-bottom: 16px; }
    .error-list li {
      background: rgba(224,85,85,0.1); border: 1px solid rgba(224,85,85,0.2);
      color: #E05555; padding: 9px 14px; border-radius: 7px;
      font-size: 13px; margin-bottom: 6px;
    }
    .divider { height: 1px; background: var(--border); margin: 20px 0; }
    .hint { text-align: center; font-size: 12px; color: var(--text-dim); }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="brand">
      <div class="brand-icon">M</div>
      <div class="brand-name">Meet<span>Wise</span></div>
      <div class="brand-tagline">Smart meetings. Clear outcomes.</div>
    </div>
    <div class="card">
      <h2>Welcome back</h2>
      <p>Sign in to access your meetings</p>
      {% if form.non_field_errors %}
      <ul class="error-list">
        {% for err in form.non_field_errors %}<li>{{ err }}</li>{% endfor %}
      </ul>
      {% endif %}
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" placeholder="Enter username" autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Enter password">
        </div>
        <input type="hidden" name="next" value="{{ next }}">
        <button type="submit" class="btn-primary">Sign In →</button>
      </form>
      <div class="divider"></div>
      <div class="hint">Demo: Use admin / <em>your password</em> or create users via Django admin</div>
    </div>
  </div>
</body>
</html>
